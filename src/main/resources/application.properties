spring.datasource.url=${SPRING_DATABASE_URL}
spring.datasource.username=${SPRING_DATABASE_USERNAME}
spring.datasource.password=${SPRING_DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.mail.host=${MAIL_HOST}
spring.mail.port=587
spring.mail.username=${EMAIL}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
security.jwt.expirationTime=1800000
security.jwt.refreshExpirationTime=${EXPIRATION_TIME_FOR_REFRESH_TOKEN}
security.jwt.publicKey=${PUBLIC_KEY:}
security.jwt.privateKey=${PRIVATE_KEY:}
security.jwt.publicKeyPath=${PUBLIC_KEY_PATH:}
security.jwt.privateKeyPath=${PRIVATE_KEY_PATH:}
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST}
logging.level.org.springframework.mail=WARN
logging.level.org.springframework.security=INFO
logging.level.com.atlasmind.ai_travel_recommendation=INFO
#okta.oauth2.issuer=https://<your-auth0-domain>/
#okta.oauth2.audience=${okta.oauth2.issuer}api/v2/
#okta.oauth2.client-id=${CLIENT_ID}
#okta.oauth2.client-secret=${CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-id=${CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${CLIENT_SECRET}
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.cache.type=redis
tmdb.api.base-url=https://api.themoviedb.org/3/
tmdb.api.token=${TMDB_API_TOKEN}
atlaswatch.catalog.ingestion.enabled=${ATLASWATCH_CATALOG_INGESTION_ENABLED:true}
atlaswatch.catalog.ingestion.fixed-delay-ms=${ATLASWATCH_CATALOG_INGESTION_FIXED_DELAY_MS:43200000}
atlaswatch.catalog.ingestion.initial-delay-ms=${ATLASWATCH_CATALOG_INGESTION_INITIAL_DELAY_MS:300000}
atlaswatch.catalog.ingestion.rate-limit-ms=${ATLASWATCH_CATALOG_INGESTION_RATE_LIMIT_MS:250}
atlaswatch.catalog.ingestion.stale-after-hours=${ATLASWATCH_CATALOG_INGESTION_STALE_AFTER_HOURS:168}
atlaswatch.catalog.ingestion.minimum-catalog-size=${ATLASWATCH_CATALOG_MINIMUM_SIZE:500}
atlaswatch.catalog.ingestion.popular-pages=${ATLASWATCH_CATALOG_POPULAR_PAGES:10}
atlaswatch.catalog.ingestion.top-rated-pages=${ATLASWATCH_CATALOG_TOP_RATED_PAGES:10}
atlaswatch.catalog.ingestion.trending-pages=${ATLASWATCH_CATALOG_TRENDING_PAGES:5}
atlaswatch.catalog.ingestion.discover-pages-per-genre=${ATLASWATCH_CATALOG_DISCOVER_PAGES_PER_GENRE:3}
atlaswatch.catalog.ingestion.discover-genre-ids=${ATLASWATCH_CATALOG_DISCOVER_GENRE_IDS:28,12,16,35,80,99,18,10751,14,36,27,10402,9648,10749,878,53,10752,37}
atlaswatch.recommendation.scoring.genre-affinity-weight=${ATLASWATCH_REC_GENRE_WEIGHT:0.24}
atlaswatch.recommendation.scoring.mood-match-weight=${ATLASWATCH_REC_MOOD_WEIGHT:0.18}
atlaswatch.recommendation.scoring.runtime-match-weight=${ATLASWATCH_REC_RUNTIME_WEIGHT:0.14}
atlaswatch.recommendation.scoring.quality-weight=${ATLASWATCH_REC_QUALITY_WEIGHT:0.18}
atlaswatch.recommendation.scoring.popularity-weight=${ATLASWATCH_REC_POPULARITY_WEIGHT:0.08}
atlaswatch.recommendation.scoring.watchlist-boost-weight=${ATLASWATCH_REC_WATCHLIST_WEIGHT:0.10}
atlaswatch.recommendation.scoring.freshness-weight=${ATLASWATCH_REC_FRESHNESS_WEIGHT:0.08}
atlaswatch.recommendation.scoring.watchlist-age-weight=${ATLASWATCH_REC_WATCHLIST_AGE_WEIGHT:0.12}
atlaswatch.recommendation.scoring.disliked-genre-penalty-weight=${ATLASWATCH_REC_DISLIKED_PENALTY_WEIGHT:0.18}
atlaswatch.recommendation.scoring.diversity-penalty-weight=${ATLASWATCH_REC_DIVERSITY_PENALTY_WEIGHT:0.15}
atlaswatch.recommendation.scoring.popularity-saturation=${ATLASWATCH_REC_POPULARITY_SATURATION:200.0}
atlaswatch.recommendation.scoring.freshness-window-years=${ATLASWATCH_REC_FRESHNESS_WINDOW_YEARS:15.0}
atlaswatch.recommendation.scoring.watchlist-age-saturation-days=${ATLASWATCH_REC_WATCHLIST_AGE_SATURATION_DAYS:180}
atlaswatch.recommendation.scoring.positive-genre-reason-threshold=${ATLASWATCH_REC_POSITIVE_GENRE_REASON_THRESHOLD:0.25}
atlaswatch.recommendation.scoring.strong-dislike-threshold=${ATLASWATCH_REC_STRONG_DISLIKE_THRESHOLD:0.35}
spring.config.import=optional:file:.env[.properties]
